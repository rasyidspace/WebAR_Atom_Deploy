<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAR Atom — Model Atom Interaktif</title>
  <meta name="description" content="Scan marker untuk melihat model atom 3D secara augmented reality" />

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; width: 100%;
      background: linear-gradient(135deg, rgba(10,10,30,0.88), rgba(30,10,60,0.88));
      backdrop-filter: blur(12px);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(120,80,255,0.3);
      z-index: 999;
    }
    #header h1 { color: #fff; font-size: 17px; font-weight: 700; letter-spacing: 1px; }
    #header span { color: #a78bfa; font-size: 12px; }

    /* ── Scan Guide ── */
    #scan-guide {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; z-index: 998;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    #scan-guide.hidden { opacity: 0; pointer-events: none; }

    .scan-frame {
      width: 210px; height: 210px;
      border: 2px solid rgba(167,139,250,0.5);
      border-radius: 14px;
      margin: 0 auto 14px;
      animation: pulse 2s infinite;
    }
    #scan-guide p { color: rgba(255,255,255,0.85); font-size: 14px; text-shadow: 0 2px 8px rgba(0,0,0,0.9); }

    @keyframes pulse {
      0%,100% { border-color: rgba(167,139,250,0.3); box-shadow: none; }
      50%      { border-color: rgba(167,139,250,1);   box-shadow: 0 0 24px 4px rgba(167,139,250,0.2); }
    }

    /* ── Info Panel ── */
    #info-panel {
      position: fixed; bottom: 80px; left: 0; width: 100%;
      background: linear-gradient(135deg, rgba(10,10,30,0.92), rgba(30,10,60,0.92));
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(120,80,255,0.4);
      padding: 14px 20px;
      transform: translateY(120%);
      transition: transform 0.4s ease;
      z-index: 999;
    }
    #info-panel.visible   { transform: translateY(0); }
    #info-panel h2 { color: #a78bfa; font-size: 15px; font-weight: 700; margin-bottom: 5px; }
    #info-panel p  { color: rgba(255,255,255,0.8); font-size: 12px; line-height: 1.6; }

    /* ── Tombol Scan Marker Lain ── */
    #btn-reset {
      position: fixed; bottom: 0; left: 0; width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff; font-size: 15px; font-weight: 700;
      border: none; cursor: pointer; z-index: 1000;
      letter-spacing: 0.5px;
      transform: translateY(100%);
      transition: transform 0.4s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #btn-reset.visible { transform: translateY(0); }
    #btn-reset:active  { background: linear-gradient(135deg, #6d28d9, #4338ca); }

    /* ── Hint interaksi ── */
    #gesture-hint {
      position: fixed; top: 70px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.85); font-size: 12px;
      padding: 6px 14px; border-radius: 20px;
      z-index: 999; pointer-events: none;
      opacity: 0; transition: opacity 0.4s;
      white-space: nowrap;
    }
    #gesture-hint.visible { opacity: 1; }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <h1>⚛️ WebAR Atom</h1>
    <span id="header-sub">Scan marker untuk melihat model atom</span>
  </div>

  <!-- Hint interaksi -->
  <div id="gesture-hint">👆 Geser untuk rotasi &nbsp;|&nbsp; 🤏 Pinch untuk zoom</div>

  <!-- Scan Guide -->
  <div id="scan-guide">
    <div class="scan-frame"></div>
    <p>Arahkan kamera ke marker atom</p>
  </div>

  <!-- Info Panel -->
  <div id="info-panel">
    <h2 id="info-title">-</h2>
    <p id="info-desc">-</p>
  </div>

  <!-- Reset Button -->
  <button id="btn-reset">🔍 Scan Marker Lain</button>

  <!-- A-Frame Scene -->
  <a-scene
    mindar-image="imageTargetSrc: ./markers/targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="model-dalton"      src="./models/dalton.glb"></a-asset-item>
      <a-asset-item id="model-mekakuantum" src="./models/mekakuantum.glb"></a-asset-item>
      <a-asset-item id="model-nielsbohr"   src="./models/nielsbohr.glb"></a-asset-item>
      <a-asset-item id="model-rutherford"  src="./models/rutherford.glb"></a-asset-item>
      <a-asset-item id="model-thomson"     src="./models/thomson.glb"></a-asset-item>
    </a-assets>

    <!-- Kamera tanpa child model -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Model di world space fixed position (kamera MindAR selalu fixed di origin) -->
    <a-entity id="model-display" position="0 0 -1" visible="false">
      <a-gltf-model id="display-0" src="#model-dalton"      scale="0.5 0.5 0.5" visible="false"></a-gltf-model>
      <a-gltf-model id="display-1" src="#model-mekakuantum" scale="0.5 0.5 0.5" visible="false"></a-gltf-model>
      <a-gltf-model id="display-2" src="#model-nielsbohr"   scale="0.5 0.5 0.5" visible="false"></a-gltf-model>
      <a-gltf-model id="display-3" src="#model-rutherford"  scale="0.5 0.5 0.5" visible="false"></a-gltf-model>
      <a-gltf-model id="display-4" src="#model-thomson"     scale="0.5 0.5 0.5" visible="false"></a-gltf-model>
    </a-entity>

    <!-- Image Targets — hanya sebagai trigger, TANPA model di dalamnya -->
    <a-entity mindar-image-target="targetIndex: 0" id="target-dalton"></a-entity>
    <a-entity mindar-image-target="targetIndex: 1" id="target-mekakuantum"></a-entity>
    <a-entity mindar-image-target="targetIndex: 2" id="target-nielsbohr"></a-entity>
    <a-entity mindar-image-target="targetIndex: 3" id="target-rutherford"></a-entity>
    <a-entity mindar-image-target="targetIndex: 4" id="target-thomson"></a-entity>

  </a-scene>

  <script>
    // ── Data Marker ──────────────────────────────────────
    const MARKER_INFO = {
      'target-dalton':      { index: 0, title: 'Teori Atom Dalton',       desc: 'John Dalton (1803) — Model atom bola pejal. Atom adalah bola kecil keras yang tidak dapat dibagi-bagi.' },
      'target-mekakuantum': { index: 1, title: 'Model Mekanika Kuantum',  desc: 'Model modern — Elektron berada dalam orbital berupa awan probabilitas di sekitar inti atom.' },
      'target-nielsbohr':   { index: 2, title: 'Teori Atom Niels Bohr',   desc: 'Niels Bohr (1913) — Elektron mengorbit inti dalam lintasan/kulit tertentu dengan energi tetap.' },
      'target-rutherford':  { index: 3, title: 'Teori Atom Rutherford',   desc: 'Ernest Rutherford (1911) — Atom punya inti kecil bermuatan positif, dikelilingi elektron.' },
      'target-thomson':     { index: 4, title: 'Teori Atom Thomson',       desc: 'J.J. Thomson (1897) — Model roti kismis. Elektron tersebar dalam bola bermuatan positif.' },
    };

    // ── State ─────────────────────────────────────────────
    let isLocked        = false;
    let activeModelObj  = null; // THREE.Object3D dari model aktif

    // ── UI Elements ───────────────────────────────────────
    const scanGuide    = document.getElementById('scan-guide');
    const infoPanel    = document.getElementById('info-panel');
    const infoTitle    = document.getElementById('info-title');
    const infoDesc     = document.getElementById('info-desc');
    const btnReset     = document.getElementById('btn-reset');
    const modelDisplay = document.getElementById('model-display');
    const gestureHint  = document.getElementById('gesture-hint');

    // ── Tampilkan model saat marker ditemukan ─────────────
    document.querySelectorAll('[mindar-image-target]').forEach(target => {
      target.addEventListener('targetFound', () => {
        if (isLocked) return;            // sudah ada model → abaikan
        isLocked = true;

        const info = MARKER_INFO[target.id];
        if (!info) return;

        // Sembunyikan semua display model dulu
        for (let i = 0; i < 5; i++)
          document.getElementById(`display-${i}`).setAttribute('visible', 'false');

        // Tampilkan model yang sesuai
        const displayEl = document.getElementById(`display-${info.index}`);
        displayEl.setAttribute('visible', 'true');
        modelDisplay.setAttribute('visible', 'true');
        activeModelObj = displayEl.object3D;

        // Update UI
        infoTitle.textContent = info.title;
        infoDesc.textContent  = info.desc;
        scanGuide.classList.add('hidden');
        infoPanel.classList.add('visible');
        btnReset.classList.add('visible');

        // Tampilkan hint gesture sebentar
        gestureHint.classList.add('visible');
        setTimeout(() => gestureHint.classList.remove('visible'), 3000);
      });

      // targetLost diabaikan saat locked
    });

    // ── Tombol Reset ──────────────────────────────────────
    btnReset.addEventListener('click', () => {
      isLocked       = false;
      activeModelObj = null;

      // Reset rotasi & skala semua model ke default
      for (let i = 0; i < 5; i++) {
        const el = document.getElementById(`display-${i}`);
        el.setAttribute('visible', 'false');
        el.object3D.rotation.set(0, 0, 0);
        el.object3D.scale.set(0.5, 0.5, 0.5);
      }

      modelDisplay.setAttribute('visible', 'false');
      infoPanel.classList.remove('visible');
      btnReset.classList.remove('visible');
      scanGuide.classList.remove('hidden');
    });

    // ── Gesture: Rotasi & Zoom ────────────────────────────
    let prevTouchX       = null;
    let prevTouchY       = null;
    let initPinchDist    = null;
    let initScale        = null;

    document.addEventListener('touchstart', e => {
      if (!activeModelObj) return;
      if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        initPinchDist = Math.sqrt(dx*dx + dy*dy);
        initScale     = activeModelObj.scale.x;
      } else if (e.touches.length === 1) {
        prevTouchX = e.touches[0].clientX;
        prevTouchY = e.touches[0].clientY;
      }
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (!activeModelObj) return;

      if (e.touches.length === 2 && initPinchDist && initScale) {
        // Zoom (pinch)
        const dx   = e.touches[0].clientX - e.touches[1].clientX;
        const dy   = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const s    = Math.min(Math.max(initScale * (dist / initPinchDist), 0.05), 1.5);
        activeModelObj.scale.set(s, s, s);

      } else if (e.touches.length === 1 && prevTouchX !== null) {
        // Rotasi (drag)
        const dX = e.touches[0].clientX - prevTouchX;
        const dY = e.touches[0].clientY - prevTouchY;
        activeModelObj.rotation.y += dX * 0.015;
        activeModelObj.rotation.x += dY * 0.015;
        prevTouchX = e.touches[0].clientX;
        prevTouchY = e.touches[0].clientY;
      }
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (e.touches.length < 2) initPinchDist = null;
      if (e.touches.length === 0) { prevTouchX = null; prevTouchY = null; }
    }, { passive: true });
  </script>

</body>
</html>
