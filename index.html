<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAR Atom — Model Atom Interaktif</title>
  <meta name="description" content="Scan marker untuk melihat model atom 3D secara augmented reality" />

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <script>
    // Gesture Handler — Rotasi & Zoom model yang aktif
    AFRAME.registerComponent('gesture-handler', {
      init: function () {
        this.activeModel = null;
        this.prevTouchX = null;
        this.prevTouchY = null;
        this.initialPinchDist = null;
        this.initialScale = null;

        const sceneEl = this.el;

        // Set active model saat marker ditemukan
        document.querySelectorAll('[mindar-image-target]').forEach(target => {
          target.addEventListener('targetFound', () => {
            this.activeModel = target.querySelector('a-gltf-model');
            this.initialScale = this.activeModel
              ? this.activeModel.object3D.scale.clone()
              : null;
          });
          target.addEventListener('targetLost', () => {
            this.activeModel = null;
          });
        });

        // Touch Events
        sceneEl.canvas && this._bindEvents(sceneEl.canvas);
        sceneEl.addEventListener('loaded', () => {
          this._bindEvents(sceneEl.canvas);
        });
      },

      _bindEvents: function (canvas) {
        if (!canvas || this._bound) return;
        this._bound = true;

        canvas.addEventListener('touchstart', (e) => {
          if (e.touches.length === 2) {
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            this.initialPinchDist = Math.sqrt(dx * dx + dy * dy);
            if (this.activeModel)
              this.initialScale = this.activeModel.object3D.scale.clone();
          } else if (e.touches.length === 1) {
            this.prevTouchX = e.touches[0].clientX;
            this.prevTouchY = e.touches[0].clientY;
          }
        }, { passive: true });

        canvas.addEventListener('touchmove', (e) => {
          if (!this.activeModel) return;
          const obj = this.activeModel.object3D;

          if (e.touches.length === 2 && this.initialPinchDist && this.initialScale) {
            // ZOOM (pinch)
            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const factor = dist / this.initialPinchDist;
            const newScale = Math.min(Math.max(this.initialScale.x * factor, 0.05), 2.0);
            obj.scale.set(newScale, newScale, newScale);

          } else if (e.touches.length === 1 && this.prevTouchX !== null) {
            // ROTASI (drag)
            const deltaX = e.touches[0].clientX - this.prevTouchX;
            const deltaY = e.touches[0].clientY - this.prevTouchY;
            obj.rotation.y += deltaX * 0.015;
            obj.rotation.x += deltaY * 0.015;
            this.prevTouchX = e.touches[0].clientX;
            this.prevTouchY = e.touches[0].clientY;
          }
        }, { passive: true });

        canvas.addEventListener('touchend', () => {
          this.prevTouchX = null;
          this.prevTouchY = null;
          if (e && e.touches && e.touches.length < 2)
            this.initialPinchDist = null;
        }, { passive: true });
      }
    });
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

    #header {
      position: fixed;
      top: 0; left: 0; width: 100%;
      background: linear-gradient(135deg, rgba(10,10,30,0.85), rgba(30,10,60,0.85));
      backdrop-filter: blur(10px);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(120,80,255,0.3);
      z-index: 999;
    }

    #header h1 { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    #header span { color: #a78bfa; font-size: 13px; }

    #info-panel {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      background: linear-gradient(135deg, rgba(10,10,30,0.92), rgba(30,10,60,0.92));
      backdrop-filter: blur(15px);
      border-top: 1px solid rgba(120,80,255,0.4);
      padding: 16px 20px 24px;
      transform: translateY(100%);
      transition: transform 0.4s ease;
      z-index: 999;
    }

    #info-panel.visible { transform: translateY(0); }
    #info-panel h2 { color: #a78bfa; font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    #info-panel p { color: rgba(255,255,255,0.8); font-size: 13px; line-height: 1.6; }

    #scan-guide {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 998;
      pointer-events: none;
      transition: opacity 0.5s;
    }

    #scan-guide.hidden { opacity: 0; }

    .scan-frame {
      width: 220px; height: 220px;
      border: 2px solid rgba(167,139,250,0.5);
      border-radius: 12px;
      margin: 0 auto 16px;
      animation: pulse 2s infinite;
    }

    #scan-guide p { color: rgba(255,255,255,0.85); font-size: 14px; text-shadow: 0 2px 8px rgba(0,0,0,0.9); }

    @keyframes pulse {
      0%, 100% { border-color: rgba(167,139,250,0.3); box-shadow: 0 0 0 0 rgba(167,139,250,0); }
      50% { border-color: rgba(167,139,250,1); box-shadow: 0 0 20px 4px rgba(167,139,250,0.2); }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <h1>⚛️ WebAR Atom</h1>
    <span>Scan marker untuk melihat model atom</span>
  </div>

  <!-- Scan Guide -->
  <div id="scan-guide">
    <div class="scan-frame"></div>
    <p>Arahkan kamera ke marker atom</p>
  </div>

  <!-- Info Panel -->
  <div id="info-panel">
    <h2 id="info-title">-</h2>
    <p id="info-desc">-</p>
  </div>

  <!-- A-Frame MindAR Scene -->
  <a-scene
    mindar-image="imageTargetSrc: ./markers/targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    gesture-handler
  >

    <a-assets>
      <a-asset-item id="model-dalton"      src="./models/dalton.glb"></a-asset-item>
      <a-asset-item id="model-mekakuantum" src="./models/mekakuantum.glb"></a-asset-item>
      <a-asset-item id="model-nielsbohr"   src="./models/nielsbohr.glb"></a-asset-item>
      <a-asset-item id="model-rutherford"  src="./models/rutherford.glb"></a-asset-item>
      <a-asset-item id="model-thomson"     src="./models/thomson.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Index 0: Dalton -->
    <a-entity mindar-image-target="targetIndex: 0" id="target-dalton">
      <a-gltf-model src="#model-dalton" position="0 0 0" rotation="0 0 0" scale="0.24 0.24 0.24"></a-gltf-model>
    </a-entity>

    <!-- Index 1: MekaKuantum -->
    <a-entity mindar-image-target="targetIndex: 1" id="target-mekakuantum">
      <a-gltf-model src="#model-mekakuantum" position="0 0 0" rotation="0 0 0" scale="0.24 0.24 0.24"></a-gltf-model>
    </a-entity>

    <!-- Index 2: NielsBohr -->
    <a-entity mindar-image-target="targetIndex: 2" id="target-nielsbohr">
      <a-gltf-model src="#model-nielsbohr" position="0 0 0" rotation="0 0 0" scale="0.24 0.24 0.24"></a-gltf-model>
    </a-entity>

    <!-- Index 3: Rutherford -->
    <a-entity mindar-image-target="targetIndex: 3" id="target-rutherford">
      <a-gltf-model src="#model-rutherford" position="0 0 0" rotation="0 0 0" scale="0.24 0.24 0.24"></a-gltf-model>
    </a-entity>

    <!-- Index 4: Thomson -->
    <a-entity mindar-image-target="targetIndex: 4" id="target-thomson">
      <a-gltf-model src="#model-thomson" position="0 0 0" rotation="0 0 0" scale="0.24 0.24 0.24"></a-gltf-model>
    </a-entity>

  </a-scene>

  <script>
    const MARKER_INFO = {
      'target-dalton':      { title: 'Teori Atom Dalton', desc: 'John Dalton (1803) — Model atom bola pejal. Atom adalah bola kecil keras yang tidak dapat dibagi-bagi.' },
      'target-mekakuantum': { title: 'Model Mekanika Kuantum', desc: 'Model modern — Elektron berada dalam orbital berupa awan probabilitas di sekitar inti atom.' },
      'target-nielsbohr':   { title: 'Teori Atom Niels Bohr', desc: 'Niels Bohr (1913) — Elektron mengorbit inti dalam lintasan/kulit tertentu dengan energi tetap.' },
      'target-rutherford':  { title: 'Teori Atom Rutherford', desc: 'Ernest Rutherford (1911) — Atom punya inti kecil bermuatan positif, dikelilingi elektron.' },
      'target-thomson':     { title: 'Teori Atom Thomson', desc: 'J.J. Thomson (1897) — Model roti kismis. Elektron tersebar dalam bola bermuatan positif.' },
    };

    const infoPanel  = document.getElementById('info-panel');
    const scanGuide  = document.getElementById('scan-guide');
    const infoTitle  = document.getElementById('info-title');
    const infoDesc   = document.getElementById('info-desc');

    document.querySelectorAll('[mindar-image-target]').forEach(el => {
      el.addEventListener('targetFound', () => {
        const info = MARKER_INFO[el.id];
        if (info) {
          infoTitle.textContent = info.title;
          infoDesc.textContent  = info.desc;
          infoPanel.classList.add('visible');
          scanGuide.classList.add('hidden');
        }
      });
      el.addEventListener('targetLost', () => {
        infoPanel.classList.remove('visible');
        scanGuide.classList.remove('hidden');
      });
    });
  </script>

</body>
</html>
