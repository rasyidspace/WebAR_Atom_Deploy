<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAR Atom — Model Atom Interaktif</title>
  <meta name="description" content="Scan marker untuk melihat model atom 3D secara augmented reality" />

  <!-- MindAR untuk deteksi marker saja -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- Model Viewer untuk display 3D (built-in rotate & zoom) -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', sans-serif;
    }

    /* MindAR scene di background */
    a-scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(135deg, rgba(10, 10, 30, 0.88), rgba(30, 10, 60, 0.88));
      backdrop-filter: blur(12px);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(120, 80, 255, 0.3);
      z-index: 999;
    }

    #header h1 {
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    #header span {
      color: #a78bfa;
      font-size: 12px;
    }

    /* ── Scan Guide ── */
    #scan-guide {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 998;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    #scan-guide.hidden {
      opacity: 0;
    }

    .scan-frame {
      width: 210px;
      height: 210px;
      border: 2px solid rgba(167, 139, 250, 0.5);
      border-radius: 14px;
      margin: 0 auto 14px;
      animation: pulse 2s infinite;
    }

    #scan-guide p {
      color: rgba(255, 255, 255, 0.85);
      font-size: 14px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
    }

    @keyframes pulse {

      0%,
      100% {
        border-color: rgba(167, 139, 250, 0.3);
        box-shadow: none;
      }

      50% {
        border-color: rgba(167, 139, 250, 1);
        box-shadow: 0 0 24px 4px rgba(167, 139, 250, 0.2);
      }
    }

    /* ── Model Viewer (overlay di tengah) ── */
    #atom-viewer {
      position: fixed;
      top: 56px;
      left: 0;
      width: 100%;
      height: calc(100% - 56px - 130px);
      z-index: 100;
      display: none;
      background: transparent;
      --poster-color: transparent;
    }

    /* ── Info Panel ── */
    #info-panel {
      position: fixed;
      bottom: 64px;
      left: 0;
      width: 100%;
      background: linear-gradient(135deg, rgba(10, 10, 30, 0.92), rgba(30, 10, 60, 0.92));
      backdrop-filter: blur(16px);
      border-top: 1px solid rgba(120, 80, 255, 0.4);
      padding: 12px 20px;
      transform: translateY(120%);
      transition: transform 0.4s ease;
      z-index: 999;
    }

    #info-panel.visible {
      transform: translateY(0);
    }

    #info-panel h2 {
      color: #a78bfa;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    #info-panel p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      line-height: 1.6;
    }

    /* ── Hint interaksi ── */
    #gesture-hint {
      position: fixed;
      top: 66px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.9);
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 20px;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
      white-space: nowrap;
    }

    #gesture-hint.visible {
      opacity: 1;
    }

    /* ── Reset Button ── */
    #btn-reset {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transform: translateY(100%);
      transition: transform 0.4s ease;
    }

    #btn-reset.visible {
      transform: translateY(0);
    }

    #btn-reset:active {
      background: linear-gradient(135deg, #6d28d9, #4338ca);
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div id="header">
    <h1>Atom Visualizer</h1>
    <span>Scan marker untuk melihat model atom</span>
  </div>

  <!-- Scan Guide -->
  <div id="scan-guide">
    <div class="scan-frame"></div>
    <p>Arahkan kamera ke marker atom</p>
  </div>

  <!-- Model Viewer overlay (tersembunyi sampai marker di-scan) -->
  <model-viewer id="atom-viewer" camera-controls touch-action="pan-y" shadow-intensity="0" exposure="1" auto-rotate
    auto-rotate-delay="3000"></model-viewer>

  <!-- Hint Gesture -->
  <div id="gesture-hint">👆 Drag rotasi &nbsp;|&nbsp; 🤏 Pinch zoom</div>

  <!-- Info Panel -->
  <div id="info-panel">
    <h2 id="info-title">-</h2>
    <p id="info-desc">-</p>
  </div>

  <!-- Reset Button -->
  <button id="btn-reset">🔍 Scan Atom Lain</button>

  <!-- A-Frame MindAR — hanya untuk deteksi marker, kamera feed di background -->
  <a-scene
    mindar-image="imageTargetSrc: ./markers/targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: no;"
    color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Image Targets — hanya sebagai trigger -->
    <a-entity mindar-image-target="targetIndex: 0" id="target-dalton"></a-entity>
    <a-entity mindar-image-target="targetIndex: 1" id="target-mekakuantum"></a-entity>
    <a-entity mindar-image-target="targetIndex: 2" id="target-nielsbohr"></a-entity>
    <a-entity mindar-image-target="targetIndex: 3" id="target-rutherford"></a-entity>
    <a-entity mindar-image-target="targetIndex: 4" id="target-thomson"></a-entity>
  </a-scene>

  <script>
    // ── Data Marker ──────────────────────────────────────
    const MARKER_INFO = {
      'target-dalton': { model: './models/dalton.glb', title: 'Teori Atom Dalton', desc: 'John Dalton (1803) — Model atom bola pejal. Atom adalah bola kecil keras yang tidak dapat dibagi-bagi.' },
      'target-mekakuantum': { model: './models/mekakuantum.glb', title: 'Model Mekanika Kuantum', desc: 'Model modern — Elektron berada dalam orbital berupa awan probabilitas di sekitar inti atom.' },
      'target-nielsbohr': { model: './models/nielsbohr.glb', title: 'Teori Atom Niels Bohr', desc: 'Niels Bohr (1913) — Elektron mengorbit inti dalam lintasan/kulit tertentu dengan energi tetap.' },
      'target-rutherford': { model: './models/rutherford.glb', title: 'Teori Atom Rutherford', desc: 'Ernest Rutherford (1911) — Atom punya inti kecil bermuatan positif, dikelilingi elektron.' },
      'target-thomson': { model: './models/thomson.glb', title: 'Teori Atom Thomson', desc: 'J.J. Thomson (1897) — Model roti kismis. Elektron tersebar dalam bola bermuatan positif.' },
    };

    // ── UI Elements ───────────────────────────────────────
    const atomViewer = document.getElementById('atom-viewer');
    const scanGuide = document.getElementById('scan-guide');
    const infoPanel = document.getElementById('info-panel');
    const infoTitle = document.getElementById('info-title');
    const infoDesc = document.getElementById('info-desc');
    const btnReset = document.getElementById('btn-reset');
    const gestureHint = document.getElementById('gesture-hint');

    let isLocked = false;

    // ── Trigger saat marker ditemukan ────────────────────
    document.querySelectorAll('[mindar-image-target]').forEach(target => {
      target.addEventListener('targetFound', () => {
        if (isLocked) return;
        isLocked = true;

        const info = MARKER_INFO[target.id];
        if (!info) return;

        // Load dan tampilkan model
        atomViewer.src = info.model;
        atomViewer.style.display = 'block';

        // Update UI
        infoTitle.textContent = info.title;
        infoDesc.textContent = info.desc;
        scanGuide.classList.add('hidden');
        infoPanel.classList.add('visible');
        btnReset.classList.add('visible');

        // Hint gesture 3 detik
        gestureHint.classList.add('visible');
        setTimeout(() => gestureHint.classList.remove('visible'), 3000);
      });
    });

    // ── Reset ─────────────────────────────────────────────
    btnReset.addEventListener('click', () => {
      isLocked = false;
      atomViewer.style.display = 'none';
      atomViewer.src = '';

      // Sembunyikan info panel & reset teksnya
      infoPanel.classList.remove('visible');
      setTimeout(() => {
        infoTitle.textContent = '-';
        infoDesc.textContent = '-';
      }, 400); // tunggu animasi selesai dulu

      btnReset.classList.remove('visible');
      scanGuide.classList.remove('hidden');
    });
  </script>

</body>

</html>
